<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學跑酷 - V6 完美流程版</title>
    <style>
        /* 簡約風背景 */
        body {
            margin: 0;
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1e293b;
            overflow: hidden; 
            touch-action: none; 
        }

        #main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        /* 本機排行榜面板 (簡約白色卡片) */
        #leaderboard-panel {
            width: 250px;
            height: 90vh;
            max-height: 800px;
            min-height: 550px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
        }
        
        #leaderboard-title {
            color: #0f172a;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .lb-subtitle {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        #leaderboard-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #leaderboard-list::-webkit-scrollbar { width: 4px; }
        #leaderboard-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .lb-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lb-rank { font-weight: bold; color: #3b82f6; width: 25px; }
        .lb-name { flex: 1; margin: 0 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 500; }
        .lb-score { font-weight: bold; color: #10b981; text-align: right; }

        @media (max-width: 650px) {
            #main-wrapper {
                flex-direction: column;
                height: 100vh;
                overflow-y: auto;
                justify-content: flex-start;
                padding: 20px 0;
            }
            #leaderboard-panel {
                height: 300px;
                min-height: auto;
            }
            body { overflow: auto; }
        }

        /* 遊戲容器 */
        #game-container {
            width: 340px; 
            height: 90vh; 
            max-height: 800px; 
            min-height: 550px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 0); }
            40% { transform: translate(5px, 0); }
            60% { transform: translate(-5px, 0); }
            80% { transform: translate(5px, 0); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        /* 頂部 UI 面板 (簡約白底黑字) */
        #ui-bar {
            background: #ffffff;
            padding: 20px 15px 15px 15px;
            display: flex;
            flex-direction: column; 
            border-bottom: 1px solid #e2e8f0;
            z-index: 10;
            position: relative;
            flex: 0 0 auto;
        }

        .top-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        #version {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 10px;
            color: #94a3b8;
            font-weight: bold;
        }

        .stats-col {
            display: flex;
            flex-direction: column;
        }

        #score {
            font-size: 18px;
            font-weight: 800;
            color: #10b981; 
        }

        #lives {
            font-size: 14px;
            margin-top: 4px;
        }

        #timer-display {
            font-size: 20px;
            font-weight: 800;
            color: #3b82f6; 
        }

        #question {
            font-size: 38px;
            font-weight: 900;
            color: #0f172a;
            text-align: center;
            width: 100%;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* 遊戲跑道 */
        #game-board {
            width: 100%;
            flex: 1 1 auto;
            background-color: #2f3640; 
            position: relative;
            overflow: hidden;
            transition: background-color 0.1s; 
        }

        .lane-line {
            width: 4px;
            height: 100%; 
            background-image: linear-gradient(to bottom, transparent 50%, #9ca3af 50%);
            background-size: 100% 80px;
            position: absolute;
            top: 0;
            opacity: 0.6; 
        }
        .scrolling { animation: scrollRoad 0.3s linear infinite; }

        @keyframes scrollRoad {
            0% { background-position: 0 0px; }
            100% { background-position: 0 80px; }
        }

        #line-left { left: 113px; }
        #line-right { left: 226px; }

        /* 玩家跑車 */
        #car {
            width: 48px;
            height: 76px;
            background: #ef4444; 
            border-radius: 8px;
            position: absolute;
            bottom: 25px;
            transition: left 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            z-index: 5;
        }

        #car::before {
            content: '';
            position: absolute;
            top: 15px; left: 6px;
            width: 36px; height: 20px;
            background-color: #0f172a;
            border-radius: 4px;
        }
        
        #car::after { display: none; }

        /* 數學門與飄浮文字系統 */
        #gates-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; 
            z-index: 4;
            pointer-events: none;
        }

        .gate {
            position: absolute;
            width: 60px;
            height: 40px;
            background: #ffffff;
            color: #0f172a;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            line-height: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.1s, opacity 0.1s;
        }
        
        .floating-text {
            position: absolute;
            width: 50px;
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            z-index: 20;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 彈出視窗 (現代毛玻璃效果) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }
        
        .overlay h1 { color: #0f172a; margin-bottom: 10px; font-size: 32px; font-weight: 900; }
        .overlay p { color: #475569; margin-bottom: 24px; font-size: 15px; line-height: 1.6; font-weight: 500; }
        
        .setting-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 240px;
            box-sizing: border-box;
        }
        .setting-group label { font-size: 15px; font-weight: 600; color: #334155; flex: 1; text-align: left; }
        .setting-group input[type="number"] {
            width: 70px; padding: 8px; font-size: 16px; font-weight: bold;
            text-align: center; border-radius: 8px; border: 1px solid #cbd5e1;
            background: #ffffff; color: #0f172a; outline: none; transition: border 0.2s;
        }
        .setting-group input[type="number"]:focus { border-color: #3b82f6; }
        
        /* 復古藍色 Checkbox */
        .setting-group input[type="checkbox"] {
            width: 22px; height: 22px; cursor: pointer; accent-color: #3b82f6;
        }

        /* 儲存分數表單 */
        #submit-score-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 240px;
        }
        #submit-score-form input {
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            outline: none;
        }
        #submit-score-form input:focus { border-color: #3b82f6; }

        button {
            background: #3b82f6; color: white; border: none; padding: 14px 32px;
            font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background: #2563eb; }
        button:active { transform: scale(0.96); }

        /* 後台設定按鈕 (齒輪) */
        #btn-admin {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 24px;
            box-shadow: none;
            cursor: pointer;
            padding: 5px;
            color: #64748b;
        }
        #btn-admin:hover { background: transparent; transform: scale(1.1); color: #0f172a; }

    </style>
</head>
<body>

    <!-- 背景音樂 -->
    <audio id="bgm" loop>
        <!-- 使用開源動感遊戲音樂 -->
        <source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="main-wrapper">
        
        <!-- 左手邊：本機排行榜面板 -->
        <div id="leaderboard-panel">
            <div id="leaderboard-title">🏆 榮譽榜</div>
            <div class="lb-subtitle">(本機暫存紀錄)</div>
            <div id="leaderboard-list">
                <div style="text-align:center; color:#94a3b8; margin-top:20px; font-size: 14px;">暫無數據</div>
            </div>
        </div>

        <!-- 右手邊：遊戲主畫面 -->
        <div id="game-container">
            
            <div id="start-screen" class="overlay">
                <button id="btn-admin" title="主持後台">⚙️</button>
                <h1>數學跑酷</h1>
                <p>控制跑車，衝向正確答案的閘門！<br>答對加速，答錯扣命！</p>
                <button id="btn-start">開始遊戲</button>
            </div>

            <!-- 主持後台 (預設隱藏) -->
            <div id="admin-screen" class="overlay hidden" style="z-index: 30;">
                <h1 style="margin-bottom: 30px;">主持後台</h1>
                
                <div class="setting-group">
                    <label for="time-input">遊戲限時 (秒):</label>
                    <input type="number" id="time-input" value="60" min="10" max="300">
                </div>
                
                <div class="setting-group">
                    <label for="bgm-toggle">背景音樂:</label>
                    <input type="checkbox" id="bgm-toggle" checked>
                </div>

                <button id="btn-admin-close" style="margin-top: 10px; background: #10b981;">儲存並關閉</button>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h1 id="game-over-title" style="color: #ef4444;">遊戲結束</h1>
                <h2 id="final-score" style="color: #10b981; margin-bottom: 20px;">最終分數: 0</h2>
                
                <!-- 表單現在必定顯示 -->
                <div id="submit-score-form" style="background: transparent; border: none; padding:0;">
                    <input type="text" id="player-class" placeholder="班別 (例: 3A)" maxlength="10">
                    <input type="text" id="player-name" placeholder="名字 (例: 陳大文)" maxlength="15">
                </div>

                <div style="display:flex; gap:10px; flex-direction: column; width: 100%; max-width: 240px;">
                    <button id="btn-submit" style="padding: 14px; font-size: 16px;">上傳至 Google</button>
                    <!-- 跳過不再重玩，而是返回主畫面 -->
                    <button id="btn-skip" style="padding: 14px; font-size: 16px; background:#94a3b8; color: white;">跳過</button>
                </div>
            </div>

            <div id="ui-bar">
                <div id="version">V6 完美流程版</div>
                <div class="top-stats">
                    <div class="stats-col">
                        <div id="score">分數: 0</div>
                        <div id="lives">❤️❤️❤️</div>
                    </div>
                    <div id="timer-display">時間: 60s</div>
                </div>
                <div id="question">準備...</div>
            </div>

            <div id="game-board">
                <div class="lane-line" id="line-left"></div>
                <div class="lane-line" id="line-right"></div>
                
                <div id="gates-container">
                    <div class="gate" id="gate-0"></div>
                    <div class="gate" id="gate-1"></div>
                    <div class="gate" id="gate-2"></div>
                    <div class="gate" id="gate-3"></div>
                    <div class="gate" id="gate-4"></div>
                    <div class="gate" id="gate-5"></div>
                </div>

                <div id="car" style="left: 145px;"></div> 
            </div>
            
        </div>
    </div> 

    <script>
        // ==========================================
        // 教師設定區：你的 Google Apps Script 網址
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx7QHNABs5hVXOrd-AbGyDAtmCd-rNNObXFXeORu5GNh0_Gfw8vGD8PxC0evMDB8kuHcw/exec";

        // --- 本機排行榜邏輯 (LocalStorage) ---
        function loadLocalLeaderboard() {
            let records = JSON.parse(localStorage.getItem("mathRunnerScores")) || [];
            records.sort((a, b) => b.score - a.score);
            
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';
            
            if (records.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:20px; font-size:14px;">暫無數據</div>';
                return;
            }
            
            records.slice(0, 15).forEach((item, index) => {
                let rankTrophy = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                listEl.innerHTML += `
                    <div class="lb-item">
                        <div class="lb-rank">${rankTrophy}</div>
                        <div class="lb-name">${item.playerClass} ${item.playerName}</div>
                        <div class="lb-score">${item.score}</div>
                    </div>
                `;
            });
        }

        loadLocalLeaderboard();

        // --- 返回主畫面邏輯 (為下一位同學準備) ---
        function returnToStartScreen() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            
            // 清空輸入框，保護上一位同學私隱
            document.getElementById('player-class').value = '';
            document.getElementById('player-name').value = '';
        }

        // --- 儲存分數邏輯 ---
        async function saveScore() {
            const pClass = document.getElementById('player-class').value.trim() || '-';
            const pName = document.getElementById('player-name').value.trim() || '無名氏';
            
            const btn = document.getElementById('btn-submit');
            btn.innerText = "上傳中...";
            btn.disabled = true;

            // 存入本機 LocalStorage
            let records = JSON.parse(localStorage.getItem("mathRunnerScores")) || [];
            records.push({ playerClass: pClass, playerName: pName, score: score });
            localStorage.setItem("mathRunnerScores", JSON.stringify(records));
            loadLocalLeaderboard(); 

            // 傳送至 Google Sheets
            try {
                const finalUrl = WEB_APP_URL + "?pClass=" + encodeURIComponent(pClass) + 
                                             "&pName=" + encodeURIComponent(pName) + 
                                             "&score=" + encodeURIComponent(score);

                await fetch(finalUrl, {
                    method: 'GET',
                    mode: 'no-cors' 
                });
            } catch(e) { 
                console.error("上傳失敗", e); 
            }
            
            btn.innerText = "上傳至 Google";
            btn.disabled = false;
            
            // 上傳完畢，返回開始畫面，等待下一位玩家
            returnToStartScreen(); 
        }

        // --- 事件監聽 ---
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-skip').addEventListener('click', returnToStartScreen);
        document.getElementById('btn-submit').addEventListener('click', saveScore);

        // --- 後台設定事件 ---
        document.getElementById('btn-admin').addEventListener('click', () => {
            document.getElementById('admin-screen').classList.remove('hidden');
        });
        document.getElementById('btn-admin-close').addEventListener('click', () => {
            document.getElementById('admin-screen').classList.add('hidden');
        });

        // --- 音樂設定 ---
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.4; // 調整音量以免太大聲

        // --- 遊戲變數設定 ---
        let currentLane = 1; 
        const lanePositions = [31, 145, 258]; 
        const gateXPositions = [26, 140, 253]; 
        const carElement = document.getElementById('car');
        
        let score = 0;
        let lives = 3;
        let currentAnswer = 0;
        let gateOptions = []; 
        
        let gateYs = Array(6).fill(-50); 
        let gateLanes = Array(6).fill(0);
        let isColliding = Array(6).fill(false); 
        
        let baseSpeed = 2.0; 
        let gameSpeed = baseSpeed; 
        
        let isGameRunning = false;
        let animationFrameId;
        
        let timeRemaining = 60;
        let timerInterval;

        // --- 玩家控制 ---
        function moveLeft() { if (currentLane > 0) { currentLane--; updateCarUI(); } }
        function moveRight() { if (currentLane < 2) { currentLane++; updateCarUI(); } }
        function updateCarUI() { carElement.style.left = lanePositions[currentLane] + 'px'; }

        document.addEventListener('keydown', function(event) {
            if (!isGameRunning) return;
            if (event.key === 'ArrowLeft') moveLeft();
            else if (event.key === 'ArrowRight') moveRight();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        document.addEventListener('touchend', e => {
            if (!isGameRunning) return;
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 30) moveLeft(); 
            if (touchEndX > touchStartX + 30) moveRight(); 
        }, {passive: true});

        // --- 遊戲邏輯 ---

        function generateMathProblem() {
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            currentAnswer = num1 + num2;
            document.getElementById('question').innerText = `${num1} + ${num2} = ?`;

            let answerSet = new Set([currentAnswer]);
            while(answerSet.size < 6) {
                let randomOffset = Math.floor(Math.random() * 21) - 10; 
                let possibleWrong = currentAnswer + randomOffset;
                if (possibleWrong > 0 && possibleWrong !== currentAnswer) {
                    answerSet.add(possibleWrong);
                }
            }
            
            gateOptions = Array.from(answerSet);
            gateOptions.sort(() => Math.random() - 0.5); 

            let waveOffsets = [0, -400, -800];
            let gateIndex = 0;

            for(let w=0; w<3; w++) {
                let lanes = [0, 1, 2];
                lanes.sort(() => Math.random() - 0.5);
                
                gateYs[gateIndex] = -50 + waveOffsets[w];
                gateLanes[gateIndex] = lanes[0];
                isColliding[gateIndex] = false;
                updateGateDOM(gateIndex);
                gateIndex++;

                gateYs[gateIndex] = -50 + waveOffsets[w];
                gateLanes[gateIndex] = lanes[1];
                isColliding[gateIndex] = false;
                updateGateDOM(gateIndex);
                gateIndex++;
            }
        }

        function updateGateDOM(i) {
            let gateEl = document.getElementById('gate-' + i);
            gateEl.innerText = gateOptions[i];
            gateEl.style.display = 'block';
            gateEl.style.transform = 'scale(1)';
            gateEl.style.opacity = '1';
            gateEl.style.top = gateYs[i] + 'px';
            gateEl.style.left = gateXPositions[gateLanes[i]] + 'px';
        }

        function updateUI() {
            document.getElementById('score').innerText = `分數: ${score}`;
            document.getElementById('lives').innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function updateTimerUI() {
            document.getElementById('timer-display').innerText = `時間: ${timeRemaining}s`;
        }

        function showFloatingText(text, color) {
            const floatEl = document.createElement('div');
            floatEl.innerText = text;
            floatEl.className = 'floating-text';
            floatEl.style.color = color;
            floatEl.style.left = lanePositions[currentLane] + 'px'; 
            floatEl.style.top = (document.getElementById('game-board').offsetHeight - 100) + 'px';
            
            document.getElementById('game-board').appendChild(floatEl);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    floatEl.style.top = (document.getElementById('game-board').offsetHeight - 200) + 'px';
                    floatEl.style.opacity = '0';
                    floatEl.style.transform = 'scale(1.2)';
                });
            });

            setTimeout(() => floatEl.remove(), 700);
        }

        function checkCollision(gateIndex, gateEl) {
            let selectedAnswer = gateOptions[gateIndex];
            const board = document.getElementById('game-board');

            gateEl.style.transform = 'scale(0.5)';
            gateEl.style.opacity = '0';
            setTimeout(() => { gateEl.style.display = 'none'; }, 100);

            if (selectedAnswer === currentAnswer) {
                score += 10;
                board.style.backgroundColor = '#20402b'; 
                showFloatingText('+10', '#10b981'); 
            } else {
                score = Math.max(0, score - 5); 
                lives--;
                gameSpeed = Math.max(baseSpeed, gameSpeed - 0.5); 
                board.style.backgroundColor = '#402020'; 
                showFloatingText('-5', '#ef4444'); 

                const container = document.getElementById('game-container');
                container.classList.remove('shake'); 
                void container.offsetWidth; 
                container.classList.add('shake');
            }

            updateUI();
            setTimeout(() => { board.style.backgroundColor = '#2f3640'; }, 150);

            if (lives <= 0) endGame(false); 
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            
            document.getElementById('line-left').classList.add('scrolling');
            document.getElementById('line-right').classList.add('scrolling');

            // 如果後台設定開啟了 BGM，開始播放
            if (document.getElementById('bgm-toggle').checked) {
                bgm.play().catch(e => console.log("瀏覽器阻擋自動播放音樂", e));
            }

            let inputTime = parseInt(document.getElementById('time-input').value);
            timeRemaining = (isNaN(inputTime) || inputTime <= 0) ? 60 : inputTime;

            score = 0;
            lives = 3;
            gameSpeed = baseSpeed; 
            currentLane = 1;
            
            updateCarUI();
            updateUI();
            updateTimerUI();
            
            isGameRunning = true;
            generateMathProblem();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                gameSpeed += 0.08; 
                
                if (timeRemaining <= 0) endGame(true); 
            }, 1000);

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function endGame(isTimeUp) {
            isGameRunning = false;
            cancelAnimationFrame(animationFrameId);
            if (timerInterval) clearInterval(timerInterval);
            
            // 完結時暫停音樂
            bgm.pause();
            bgm.currentTime = 0;

            document.getElementById('line-left').classList.remove('scrolling');
            document.getElementById('line-right').classList.remove('scrolling');

            let titleElement = document.getElementById('game-over-title');
            if (isTimeUp) {
                titleElement.innerText = "時間到！";
                titleElement.style.color = "#0f172a"; 
            } else {
                titleElement.innerText = "心心扣光了！";
                titleElement.style.color = "#ef4444"; 
            }

            document.getElementById('final-score').innerText = `最終分數: ${score}`;
            document.getElementById('game-over-screen').classList.remove('hidden');
            
            // 提交表單而家係強制顯示，不需要再 if/else 判斷
        }

        function gameLoop() {
            if (!isGameRunning) return;

            const board = document.getElementById('game-board');
            const boardHeight = board.offsetHeight; 
            const carTopY = boardHeight - 105; 
            let allGatesPassed = true;

            for(let i=0; i<6; i++) {
                gateYs[i] += gameSpeed;
                let gateEl = document.getElementById('gate-' + i);
                
                if (gateEl.style.display !== 'none') {
                    gateEl.style.top = gateYs[i] + 'px';

                    if (gateYs[i] + 40 > carTopY && gateYs[i] < carTopY + 80 && !isColliding[i]) {
                        if (currentLane === gateLanes[i]) {
                            isColliding[i] = true; 
                            checkCollision(i, gateEl);
                        }
                    }
                }

                if (gateYs[i] <= boardHeight) {
                    allGatesPassed = false;
                }
            }

            if (allGatesPassed) {
                generateMathProblem();
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
